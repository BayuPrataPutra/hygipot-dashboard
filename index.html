<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="style.css" />

    <title>Hygipot</title>
  </head>

  <body id="body" class="transition-all dark">
    <div class="max-w-6xl mx-auto p-4 space-y-6">
      <!-- HEADER -->
      <div class="flex justify-between items-center">
        <h1 class="text-3xl font-bold title-text">Hygipot</h1>

        <div class="flex items-center gap-4">
          <!-- MQTT & ESP STATUS - desktop: badge, mobile: bulatan -->
          <div class="flex items-center gap-2">
            <!-- Mobile: bulatan saja -->
            <div
              id="mqttDot"
              class="block md:hidden w-3 h-3 rounded-full bg-red-500"
            ></div>
            <div
              id="espDot"
              class="block md:hidden w-3 h-3 rounded-full bg-red-500"
            ></div>

            <!-- Desktop: badge dengan teks -->
            <div
              id="mqttStatus"
              class="hidden md:block px-3 py-1 rounded-full text-sm font-semibold bg-red-500 text-white"
            >
              🔴 MQTT Offline
            </div>
            <div
              id="espStatus"
              class="hidden md:block px-3 py-1 rounded-full text-sm font-semibold bg-red-500 text-white"
            >
              🔴 ESP32 Offline
            </div>
          </div>

          <div class="text-right">
            <div id="clock" class="text-2xl font-bold"></div>
            <div id="date" class="text-sm opacity-70"></div>
          </div>

          <button onclick="toggleTheme()" id="themeBtn">☀️</button>
        </div>
      </div>

      <!-- GRID -->
      <div class="grid md:grid-cols-2 gap-4">
        <!-- SENSOR -->
        <div class="card p-4 rounded-xl space-y-4">
          <h2>📊 Sensor</h2>

          <div>
            <span>Suhu</span>
            <span id="temp"></span>
            <div class="bar-bg"><div id="tempBar" class="bar"></div></div>
          </div>

          <div>
            <span>Humidity</span>
            <span id="hum"></span>
            <div class="bar-bg"><div id="humBar" class="bar"></div></div>
          </div>

          <div>
            <span>Lux</span>
            <span id="lux"></span>
            <div class="bar-bg"><div id="luxBar" class="bar"></div></div>
          </div>

          <div>
            <span>Soil</span>
            <span id="soil"></span>
            <div class="bar-bg"><div id="soilBar" class="bar"></div></div>
          </div>

          <div>
            <span>Water</span>
            <span id="water"></span>
            <div class="bar-bg"><div id="waterBar" class="bar"></div></div>
          </div>
        </div>

        <!-- CONTROL -->
        <div class="card p-4 rounded-xl space-y-4">
          <h2>🎛️ Control</h2>

          <div class="flex justify-between">
            Pompa
            <label class="switch">
              <input type="checkbox" id="pump" onchange="toggle('pump')" />
              <span class="slider"></span>
            </label>
          </div>

          <div class="flex justify-between">
            Grow
            <label class="switch">
              <input type="checkbox" id="grow" onchange="toggle('grow')" />
              <span class="slider"></span>
            </label>
          </div>

          <div class="flex justify-between">
            White
            <label class="switch">
              <input type="checkbox" id="white" onchange="toggle('white')" />
              <span class="slider"></span>
            </label>
          </div>
        </div>

        <!-- SCHEDULE -->
        <div class="card p-4 rounded-xl space-y-3 md:col-span-2">
          <h2>⏰ Jadwal Penyiraman</h2>

          <div class="flex gap-2">
            <input
              type="time"
              id="time"
              class="p-2 rounded w-full text-black"
            />
            <button onclick="addSchedule()" class="btn">+</button>
          </div>

          <div id="scheduleList"></div>
        </div>

        <!-- CAMERA -->
        <div class="card p-4 rounded-xl">
          <h2 class="mb-3">📸 Kamera</h2>

          <div class="flex flex-col md:flex-row gap-4 items-start">
            <!-- PREVIEW -->
            <div
              class="w-full md:w-1/2 h-48 border-2 border-dashed rounded-lg flex items-center justify-center overflow-hidden"
            >
              <img id="img" class="w-full h-full object-cover hidden" />
              <span id="placeholder" class="opacity-50">Preview Gambar</span>
            </div>

            <!-- CONTROL SIDE -->
            <div class="w-full md:w-1/2 flex flex-col gap-3">
              <button onclick="capture()" class="btn w-full">
                📸 Ambil Gambar
              </button>

              <p class="text-sm opacity-70">
                Terakhir diambil:
                <span id="lastCapture">-</span>
              </p>
            </div>
          </div>
        </div>

        <!-- AI -->
        <div class="card p-4 rounded-xl">
          <h2>🧠 AI</h2>

          <p id="prediction">-</p>
          <div class="bar-bg"><div id="confBar" class="bar"></div></div>
          <p id="confidence"></p>
        </div>

        <!-- DEBUG LOG -->
        <div class="card p-4 rounded-xl md:col-span-2">
          <div class="flex justify-between items-center mb-3">
            <h2>🪲 Debug Log</h2>
            <button onclick="clearDebug()" class="btn text-xs py-1 px-3">
              Clear
            </button>
          </div>
          <div
            id="debugBox"
            class="font-mono text-xs rounded-lg p-3 h-56 overflow-y-auto"
            style="
              background: #0d1117;
              color: #58d68d;
              border: 1px solid #2d3748;
            "
          ></div>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>

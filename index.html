<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

    <title>Hygipot</title>
  </head>

  <body class="bg-slate-900 text-white">
    <div class="max-w-md mx-auto p-4">
      <h1 class="text-2xl font-bold text-center mb-4">🌱 Hygipot</h1>

      <!-- SENSOR -->
      <div class="bg-slate-800 p-4 rounded-xl mb-4 space-y-1">
        <p>Suhu: <span id="temp">-</span></p>
        <p>Kelembapan: <span id="hum">-</span></p>
        <p>Soil: <span id="soil">-</span></p>
        <p>Water: <span id="water">-</span></p>
        <p>Lux: <span id="lux">-</span></p>
      </div>

      <!-- CONTROL -->
      <div class="bg-slate-800 p-4 rounded-xl mb-4">
        <div class="grid grid-cols-2 gap-2">
          <button
            onclick="send(event, 'pump_on')"
            class="bg-green-500 p-2 rounded"
          >
            Pump ON
          </button>
          <button
            onclick="send(event, 'pump_off')"
            class="bg-red-500 p-2 rounded"
          >
            Pump OFF
          </button>
          <button
            onclick="send(event, 'grow_on')"
            class="bg-yellow-500 p-2 rounded"
          >
            Grow ON
          </button>
          <button
            onclick="send(event, 'grow_off')"
            class="bg-gray-500 p-2 rounded"
          >
            Grow OFF
          </button>
          <button
            onclick="send(event, 'white_on')"
            class="bg-blue-500 p-2 rounded"
          >
            White ON
          </button>
          <button
            onclick="send(event, 'white_off')"
            class="bg-gray-500 p-2 rounded"
          >
            White OFF
          </button>
        </div>
      </div>

      <!-- CAMERA -->
      <div class="bg-slate-800 p-4 rounded-xl mb-4">
        <button
          onclick="capture()"
          class="bg-purple-500 p-2 rounded w-full mb-2"
        >
          📸 Ambil Gambar
        </button>

        <p id="loading" class="text-center text-sm text-gray-400 hidden">
          Processing...
        </p>

        <img id="img" class="mt-3 rounded hidden border border-gray-700" />
      </div>

      <!-- AI -->
      <div class="bg-slate-800 p-4 rounded-xl">
        <p>Prediksi: <span id="prediction">-</span></p>
        <p>Confidence: <span id="confidence">-</span></p>
      </div>
    </div>

    <script>
      const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

      // ===== LOAD DATA SAAT REFRESH =====
      window.onload = () => {
        const lastImage = localStorage.getItem("lastImage");
        const lastPrediction = localStorage.getItem("lastPrediction");
        const lastConfidence = localStorage.getItem("lastConfidence");

        if (lastImage) {
          const img = document.getElementById("img");
          img.src = lastImage;
          img.classList.remove("hidden");
        }

        if (lastPrediction) {
          document.getElementById("prediction").innerText = lastPrediction;
        }

        if (lastConfidence) {
          document.getElementById("confidence").innerText =
            (parseFloat(lastConfidence) * 100).toFixed(2) + " %";
        }
      };

      // ===== MQTT =====
      client.on("connect", () => {
        console.log("MQTT Connected");

        client.subscribe("hygipot/data");
        client.subscribe("hygipot/image");
        client.subscribe("hygipot/ai");
      });

      client.on("message", (topic, message) => {
        // SENSOR
        if (topic === "hygipot/data") {
          let data = JSON.parse(message.toString());

          document.getElementById("temp").innerText = data.temp + " °C";
          document.getElementById("hum").innerText = data.hum + " %";
          document.getElementById("soil").innerText = data.soil;
          document.getElementById("water").innerText = data.water;
          document.getElementById("lux").innerText = data.lux + " lux";
        }

        // IMAGE
        if (topic === "hygipot/image") {
          const url = message.toString();

          const img = document.getElementById("img");
          const loading = document.getElementById("loading");

          img.src = url;
          img.classList.remove("hidden");

          loading.innerText = "Analisis AI...";

          // 💾 SIMPAN
          localStorage.setItem("lastImage", url);
        }

        // AI
        if (topic === "hygipot/ai") {
          const data = JSON.parse(message.toString());

          document.getElementById("prediction").innerText = data.prediction;
          document.getElementById("confidence").innerText =
            (data.confidence * 100).toFixed(2) + " %";

          document.getElementById("loading").classList.add("hidden");

          // 💾 SIMPAN
          localStorage.setItem("lastPrediction", data.prediction);
          localStorage.setItem("lastConfidence", data.confidence);
        }
      });

      // ===== CONTROL =====
      function send(e, msg) {
        client.publish("hygipot/control", msg);

        let btn = e.target;
        btn.classList.add("scale-90");

        setTimeout(() => btn.classList.remove("scale-90"), 150);
      }

      // ===== CAPTURE =====
      function capture() {
        const loading = document.getElementById("loading");

        loading.innerText = "Mengambil gambar...";
        loading.classList.remove("hidden");

        client.publish("hygipot/control", "capture");
      }
    </script>
  </body>
</html>
